<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Súper Test: Patrón de Normalidad - Necropsias</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin: 0 0 10px 0;
        }

        #progress-text {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2c3e50;
        }

        .option-btn:hover {
            background-color: #e2e6ea;
            border-color: #ced4da;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
            font-weight: bold;
        }

        .wrong {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
        }

        .explanation {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #1c5b85;
        }

        #next-btn {
            display: none;
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
        }

        #next-btn:hover {
            background-color: #2980b9;
        }

        #score-screen {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #3498db;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 auto 20px auto;
        }

        .restart-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="quiz-screen">
            <header>
                <h1>Repaso: Patrón de Normalidad</h1>
                <div id="progress-text">Pregunta 1 de X</div>
            </header>

            <div id="question-container">
                <div class="question-text" id="question-text">Cargando...</div>
                <div class="options-container" id="options-container"></div>
            </div>

            <div class="explanation" id="explanation"></div>
            <button id="next-btn" onclick="nextQuestion()">Siguiente</button>
        </div>

        <div id="score-screen">
            <h1>¡Test Completado!</h1>
            <div class="score-circle"><span id="final-score">0</span></div>
            <h2 id="feedback-message">¡Buen trabajo!</h2>
            <p>Sigue dándole caña, ¡el examen es tuyo!</p>
            <button class="restart-btn" onclick="restartQuiz()">Repetir Test</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "¿Cómo deben ser las superficies de los órganos en condiciones normales?",
                options: ["Rugosas y mates.", "Lisas, brillantes y con color uniforme.", "Secas y de color variable."],
                correctAnswer: 1,
                explanation: "En condiciones normales, las superficies de los órganos son lisas, brillantes y con color uniforme."
            },
            {
                question: "¿Qué sucede con el intestino como consecuencia temprana de la autolisis y putrefacción?",
                options: ["Se vuelve blanco y rígido.", "Muestra una coloración negro-verdosa.", "Se calcifica."],
                correctAnswer: 1,
                explanation: "El intestino es uno de los órganos que antes sufre fenómenos de putrefacción y puede mostrar coloración negro-verdosa."
            },
            {
                question: "¿Qué se define como una 'metástasis de laboratorio'?",
                options: ["Tumores naturales encontrados durante la necropsia.", "Infiltración de fijador en el tejido.", "Aparición de un tejido en una localización errónea por manipulación o contaminación."],
                correctAnswer: 2,
                explanation: "Se produce cuando aparece un tejido en una localización errónea por manipulación, por ejemplo contaminando un órgano sano con guantes sucios de tumor."
            },
            {
                question: "¿Qué líquidos o tejidos pide la Ley de Enjuiciamiento Criminal para análisis toxicológicos?",
                options: ["Solo sangre cardiaca.", "Humor vítreo, LCR, bilis, pelo y tejidos importantes.", "Líquido ascítico y pleural exclusivamente."],
                correctAnswer: 1,
                explanation: "La ley establece pedir humor vítreo, líquido cefalorraquídeo, bilis, pelo y tejidos importantes para análisis metabólicos y toxicológicos."
            },
            {
                question: "¿Cuál es el peso promedio del encéfalo adulto?",
                options: ["1350 g (oscila entre 1250 y 1500 g).", "800 g.", "2000 g."],
                correctAnswer: 0,
                explanation: "El encéfalo tiene un peso promedio de unos 1350 g."
            },
            {
                question: "¿En qué consiste el método de sección encefálica de Charcot?",
                options: ["Cortes horizontales.", "Cortes longitudinales.", "Secciones coronales cada centímetro."],
                correctAnswer: 2,
                explanation: "El método de Charcot consiste en realizar cortes coronales cada centímetro, perpendiculares al plano medio-sagital."
            },
            {
                question: "¿Cuál es la función del método de Wirsung o principal en la disección?",
                options: ["Cortar el riñón.", "Es un conducto pancreático; el páncreas se corta en dos siguiéndolo.", "Es una técnica para extraer el encéfalo."],
                correctAnswer: 1,
                explanation: "El páncreas se corta en dos siguiendo el conducto pancreático principal o de Wirsung."
            },
            {
                question: "¿Cuál es el peso normal de las cuatro glándulas paratiroides juntas?",
                options: ["Menos de 130 mg.", "Unos 15 gramos.", "Entre 30 y 40 gramos."],
                correctAnswer: 0,
                explanation: "Las cuatro paratiroides no sobrepasan los 130 mg en conjunto."
            },
            {
                question: "¿Cómo se comprueba la existencia de neumotórax antes de eviscerar?",
                options: ["Haciendo una placa de tórax obligatoria.", "Puncionando con una aguja conectada a una jeringa con agua para ver si burbujea.", "Abriendo el esternón bruscamente."],
                correctAnswer: 1,
                explanation: "Se punciona el espacio pleural con una jeringa que contiene agua; si existe neumotórax, se observa burbujeo."
            },
            {
                question: "¿Qué sucede con el timo a partir de los 25 años?",
                options: ["Aumenta su peso hasta los 50 gramos.", "Comienza a involucionar y es sustituido por vestigios fibroadiposos.", "Se calcifica formando un hueso mediastínico."],
                correctAnswer: 1,
                explanation: "A partir de los 25 años el timo comienza a involucionar y es sustituido por vestigios fibroadiposos."
            },
            {
                question: "¿Para qué sirve la prueba hidrostática en el corazón?",
                options: ["Para pesar el volumen ventricular.", "Para comprobar la permeabilidad de las coronarias.", "Para comprobar el funcionamiento de las válvulas sigmoideas."],
                correctAnswer: 2,
                explanation: "Su finalidad es comprobar el funcionamiento de las válvulas sigmoideas, como la aórtica y la pulmonar."
            },
            {
                question: "¿Cuál es el peso promedio del corazón en el varón adulto?",
                options: ["350 g.", "150 g.", "600 g."],
                correctAnswer: 0,
                explanation: "El peso promedio del corazón en el varón adulto es de unos 350 g."
            },
            {
                question: "¿Cuál es el grosor del miocardio del ventrículo izquierdo normal?",
                options: ["0.4 - 0.5 cm.", "1.4 - 1.5 cm.", "3.0 cm."],
                correctAnswer: 1,
                explanation: "El ventrículo izquierdo tiene un grosor aproximado de 1.4 a 1.5 cm."
            },
            {
                question: "¿Qué tinción se usa macroscópicamente para evidenciar un infarto miocárdico muy reciente?",
                options: ["Tinción de hematoxilina.", "Sales de tetrazolio.", "Azul de metileno."],
                correctAnswer: 1,
                explanation: "La técnica con sales de tetrazolio permite revelar alteraciones enzimáticas en infartos muy recientes."
            },
            {
                question: "¿Qué aspecto tienen los pulmones de la mayoría de los adultos urbanos?",
                options: ["Rosado brillante.", "Oscuros y moteados por antracosis.", "Amarillentos y consistentes."],
                correctAnswer: 1,
                explanation: "La mayoría presenta antracosis, con manchas negruzcas por aspiración de partículas contaminantes."
            },
            {
                question: "¿Por dónde se recomienda abrir el estómago?",
                options: ["Curvatura menor.", "Curvatura mayor.", "Porción antro-pilórica."],
                correctAnswer: 1,
                explanation: "Se recomienda abrir el estómago por la curvatura mayor, ya que en la menor suelen asentarse lesiones ulcerosas."
            },
            {
                question: "¿Cuál es el peso medio del hígado normal?",
                options: ["500 g.", "1500 g.", "3500 g."],
                correctAnswer: 1,
                explanation: "El peso medio del hígado es de unos 1500 g."
            },
            {
                question: "¿Cómo se debe seccionar el hígado en el examen general?",
                options: ["Cortes sagitales solo en el lóbulo derecho.", "Rebanadas coronales de 2.5 cm a través de ambos lóbulos a la vez.", "No se secciona, solo se toman biopsias externas."],
                correctAnswer: 1,
                explanation: "El hígado se examina realizando cortes en rebanadas coronales de unos 2.5 cm a través de ambos lóbulos."
            },
            {
                question: "¿Cuál es la consistencia de un hígado con degeneración grasa o esteatosis?",
                options: ["Dura y pétrea.", "Pastosa, con depresiones tras impresión digital.", "Quebradiza."],
                correctAnswer: 1,
                explanation: "El hígado graso presenta consistencia pastosa y puede quedar marcado tras la presión digital."
            },
            {
                question: "¿Cómo se abre un riñón anatómicamente para su examen?",
                options: ["En cortes transversales de 1 cm.", "En libro, mediante un corte longitudinal por el borde externo.", "En secciones coronales múltiples."],
                correctAnswer: 1,
                explanation: "La apertura típica del riñón es en libro, mediante un corte longitudinal que comienza por el borde externo."
            },
            {
                question: "¿Qué peso aproximado tienen las dos glándulas suprarrenales juntas?",
                options: ["10-14 g.", "50 g.", "2 g."],
                correctAnswer: 0,
                explanation: "Cada suprarrenal pesa unos 4 g, y entre ambas suelen estar en torno a 10-14 g."
            },
            {
                question: "¿Cómo se abren el útero y sus trompas?",
                options: ["Cortes transversales seriados.", "Como un libro, abriendo el borde derecho y superior hasta los orificios trompales.", "No se abren, solo se pesan."],
                correctAnswer: 1,
                explanation: "Se abre por el borde derecho y luego el superior, quedando como un libro cuyo lomo es el borde izquierdo."
            },
            {
                question: "¿Cuál es la indicación de normalidad al traccionar el parénquima testicular con pinzas?",
                options: ["Que no se estire.", "Que sea filante, saliendo hilos blanquecinos.", "Que sangre abundantemente."],
                correctAnswer: 1,
                explanation: "El parénquima testicular es filante a la tracción porque salen finos hilos correspondientes a los túbulos seminíferos."
            },
            {
                question: "¿Qué peso tiene una próstata normal?",
                options: ["5 g.", "28 g.", "100 g."],
                correctAnswer: 1,
                explanation: "Una próstata normal puede pesar aproximadamente 28 g."
            },
            {
                question: "¿Cómo debe cortarse el bazo para su estudio no toxicológico?",
                options: ["Lonchas de 1 cm mediante cortes longitudinales.", "Cortes transversales de 5 mm.", "Se punciona pero no se abre."],
                correctAnswer: 0,
                explanation: "Se realizan cortes seriados longitudinales formando lonchas de aproximadamente 1 cm de grosor."
            },
            {
                question: "¿Qué olor característico nos hace sospechar de intoxicación por cianuro potásico?",
                options: ["Olor a ajo.", "Olor a manzanas podridas.", "Olor a almendras amargas."],
                correctAnswer: 2,
                explanation: "La intoxicación por cianuro potásico puede asociarse a un olor a almendras amargas."
            },
            {
                question: "¿Y el olor característico a ajo, de qué nos alerta?",
                options: ["Coma hepático.", "Intoxicación por fósforo.", "Intoxicación por arsénico."],
                correctAnswer: 2,
                explanation: "El olor a ajo se ha relacionado clásicamente con intoxicación por arsénico."
            },
            {
                question: "¿Qué error genera teñir un tejido normal al rozarlo con la vesícula biliar?",
                options: ["Hígado graso.", "Simula una falsa ictericia.", "Neumoconiosis."],
                correctAnswer: 1,
                explanation: "Los pigmentos biliares pueden teñir tejidos y simular una falsa ictericia."
            },
            {
                question: "¿Qué caracteriza macroscópicamente al intestino grueso frente al delgado?",
                options: ["Es más brillante y violáceo.", "Tiene vellosidades y válvula de Meckel.", "Mayor calibre, apariencia abollada, color pálido y apéndices epiploicos."],
                correctAnswer: 2,
                explanation: "El intestino grueso se diferencia por su mayor calibre, haustras, color más pálido y presencia de apéndices epiploicos."
            },
            {
                question: "¿Cuál es el peso normal del bazo en un adulto?",
                options: ["10 - 25 g.", "100 - 250 g.", "350 - 600 g."],
                correctAnswer: 1,
                explanation: "El bazo normal en un adulto suele pesar entre 100 y 250 g."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        const questionTextElement = document.getElementById("question-text");
        const optionsContainer = document.getElementById("options-container");
        const progressText = document.getElementById("progress-text");
        const explanationElement = document.getElementById("explanation");
        const nextBtn = document.getElementById("next-btn");
        const quizScreen = document.getElementById("quiz-screen");
        const scoreScreen = document.getElementById("score-screen");
        const finalScoreElement = document.getElementById("final-score");
        const feedbackMessageElement = document.getElementById("feedback-message");

        function loadQuestion() {
            answered = false;
            explanationElement.style.display = "none";
            nextBtn.style.display = "none";
            optionsContainer.innerHTML = "";

            const currentQuestion = questions[currentQuestionIndex];
            questionTextElement.textContent = currentQuestion.question;
            progressText.textContent = `Pregunta ${currentQuestionIndex + 1} de ${questions.length}`;

            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.textContent = option;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, selectedBtn) {
            if (answered) return;
            answered = true;

            const currentQuestion = questions[currentQuestionIndex];
            const allBtns = optionsContainer.querySelectorAll(".option-btn");
            allBtns.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQuestion.correctAnswer) {
                selectedBtn.classList.add("correct");
                score++;
            } else {
                selectedBtn.classList.add("wrong");
                allBtns[currentQuestion.correctAnswer].classList.add("correct");
            }

            explanationElement.textContent = currentQuestion.explanation;
            explanationElement.style.display = "block";

            nextBtn.textContent = currentQuestionIndex === questions.length - 1
                ? "Ver Resultados"
                : "Siguiente Pregunta";
            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showScore();
            }
        }

        function showScore() {
            quizScreen.style.display = "none";
            scoreScreen.style.display = "block";
            finalScoreElement.textContent = `${score}/${questions.length}`;

            const percentage = score / questions.length;
            if (percentage >= 0.9) {
                feedbackMessageElement.textContent = "¡Matrícula de Honor! 🧠✨";
            } else if (percentage >= 0.7) {
                feedbackMessageElement.textContent = "¡Muy bien! Lo tienes casi dominado. 🚀";
            } else if (percentage >= 0.5) {
                feedbackMessageElement.textContent = "Aprobado, pero toca pulir detalles. 📖";
            } else {
                feedbackMessageElement.textContent = "¡A seguir repasando el PDF! Tú puedes 💪";
            }
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            scoreScreen.style.display = "none";
            quizScreen.style.display = "block";
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
